  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7;
      --text: #1a1a1a;
      --subtext: #555;
      --card-bg: #fff;
      --card-border: #ddd;
      --card-hover-bg: #f0f0f0;
      --card-hover-border: #bbb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --text: #fff;
        --subtext: #aaa;
        --card-bg: #2a2a4a;
        --card-border: #3a3a5a;
        --card-hover-bg: #3a3a5a;
        --card-hover-border: #5a5a7a;
      }
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      text-align: center;
      padding: 3rem;
      min-width: 50vw;
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }
    p {
      font-size: 1.5rem;
      margin-bottom: 3rem;
      color: var(--subtext);
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }
    .links a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1.25rem 2.5rem 1.25rem 6rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      font-size: 1.4rem;
      width: 320px;
      transition: background 0.2s, border-color 0.2s;
    }
    .links a:hover,
    .links a:focus-visible {
      background: var(--card-hover-bg);
      border-color: var(--card-hover-border);
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
    .links svg {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .links a span {
      flex: 1;
      text-align: center;
      padding-right: calc(32px + 0.5rem + 1rem);
    }
  </style>
